---
name: expression - illegal bareword
error: /invalid token/i
op: like
test: |-
  <hash:foo 
      baz buz
      bar (bar --or $bar)
      foo 5
  >/<var $foo.bar/>
---
name: <null:hash:varname>
comment:
result: foobarbaz
test: <null:hash:foo foo 1 bar 2 baz 3><var $foo.keys()>
---
name: <foreach $hash>
comment:
result: "foo 1bar 2baz 3"
test: <hash:foo foo 1 bar 2 baz 3><foreach $foo><var $key> <var $value></foreach>
---
name: <foreach $empty_hash>
comment:
result: ""
test: <hash:foo><foreach $foo><var $key> <var $value></foreach>
---
name: <foreach $empty_var>
comment:
result: ""
test: <foreach $foo><var $key> <var $value></foreach>
---
name: <hash:foo 1 x 2 x ...>
test: |-
  <hash:foo 1 x 2 y
  3 z>
  <var $foo.get('1')>
chomp: all
result: x
---
name: <foreach --define-var="x" $hash>
comment:
result: "foo 1bar 2baz 3"
test: <hash:foo foo 1 bar 2 baz 3><foreach --define-var="x" $foo><var $x.key> <var $x.value></foreach>
---
name: <foreach $hash> - anonoymous item
comment:
result: "foo 1bar 2baz 3"
test: <hash:foo foo 1 bar 2 baz 3><foreach $foo><var $_.key> <var $_.value></foreach>
---
name: <foreach --counter-start=1 --define-counter="i" $hash> - counter-start
comment:
result: "1: foo 12: bar 23: baz 3"
test: |-
  <hash:foo foo 1 bar 2 baz 3><foreach --counter-start="1" --define-counter="i" $foo><var $i>: <var $_.key> <var $_.value></foreach>
---
name: <foreach --start-index=1  $hash> - start-index
comment:
result: "1: bar 22: baz 3"
test: |-
  <hash:foo foo 1 bar 2 baz 3><foreach --start-index="1" $foo><var $index>: <var $_.key> <var $_.value></foreach>
---
name: <foreach $hash> - default index
comment:
result: "012"
test: |-
  <hash:foo foo 1 bar 2 baz 3><foreach $foo><var $_index></foreach>
